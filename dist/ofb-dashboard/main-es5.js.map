<div class="bal-panel">

  <!-- Loading skeleton -->
  <div *ngIf="loading" class="bal-skeleton">
    <div class="bal-skel-card"></div>
    <div class="bal-skel-divider"></div>
    <div class="bal-skel-card"></div>
  </div>

  <!-- Error -->
  <div *ngIf="!loading && error" class="bal-error">
    <span class="bal-error-icon">!</span>
    {{ error }}
    <button class="bal-retry" (click)="load()">Tentar novamente</button>
  </div>

  <!-- Balances -->
  <div *ngIf="!loading && !error && balance" class="bal-grid">

    <!-- Fiat (BRL) -->
    <div class="bal-card">
      <div class="bal-card-label">Saldo Fiat</div>
      <div class="bal-card-value">
        <span class="bal-currency-symbol">R$</span>
        {{ formatBRL(balance.fiatBalance) }}
      </div>
      <div class="bal-card-sub">Reais Brasileiros</div>
    </div>

    <!-- Peg indicator -->
    <div class="bal-peg">
      <div class="bal-peg-label">Paridade</div>
      <div class="bal-peg-ratio">1:1</div>
      <div class="bal-peg-sub">BRLN = BRL</div>
      <div class="bal-peg-badge">Estável</div>
    </div>

    <!-- BRLN -->
    <div class="bal-card bal-card--brln">
      <div class="bal-card-label">Saldo BRLN</div>
      <div class="bal-card-value">
        {{ formatBRL(balance.brlnBalance) }}
        <span class="bal-currency-symbol">BRLN</span>
      </div>
      <div class="bal-card-sub">StableCoin pegged 1:1 BRL</div>
    </div>

  </div>
</div>
