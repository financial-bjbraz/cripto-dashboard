<div class="row">
<div class="col-sm-8 col-xxxl-6">
    <div class="element-wrapper">
      <h6 class="element-header">New Orders</h6>
      <div class="element-box">
        <div class="table-responsive">
          <table class="table table-lightborder">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Products</th>
                <th class="text-center">Status</th>
                <th class="text-right">Total</th>
              </tr>
            </thead>
            <tbody>
                <ng-container *ngFor="let order of orders">
                  <tr>
                      <td class="nowrap">John Mayers</td>
                      <td><div class="cell-image-list">
                          <div class="cell-img"
                            style="background-image: url(assets/img/portfolio9.jpg)"></div>
                          <div class="cell-img"
                            style="background-image: url(assets/img/portfolio2.jpg)"></div>
                          <div class="cell-img"
                            style="background-image: url(assets/img/portfolio12.jpg)"></div>
                          <div class="cell-img-more">+ 5 more</div>
                        </div></td>
                      <td class="text-center"><div
                          class="status-pill green" data-title="Complete"
                          data-toggle="tooltip"></div></td>
                      <td class="text-right">$354</td>
                  </tr>
                </ng-container>

  <div class="col-sm-4 d-xxxl-none">
      <!--START - Top Selling Chart-->
      <div class="element-wrapper">
        <h6 class="element-header">Top Selling Today</h6>
        <div class="element-box">
          <div class="el-chart-w">
            <canvas height="120" id="donutChart" width="120"></canvas>
            <div class="inside-donut-chart-label">
              <strong>142</strong><span>Total Orders</span>
            </div>
          </div>
          <div class="el-legend condensed">
            <div class="row">
              <div
                class="col-auto col-xxxxl-6 ml-sm-auto mr-sm-auto col-6">
                <div class="legend-value-w">
                  <div class="legend-pin legend-pin-squared"
                    style="background-color: #6896f9;"></div>
                  <div class="legend-value">
                    <span>Prada</span>
                    <div class="legend-sub-value">14 Pairs</div>
                  </div>
                </div>
                <div class="legend-value-w">
                  <div class="legend-pin legend-pin-squared"
                    style="background-color: #85c751;"></div>
                  <div class="legend-value">
                    <span>Maui Jim</span>
                    <div class="legend-sub-value">26 Pairs</div>
                  </div>
                </div>
              </div>
              <div class="col-6 d-lg-none d-xxl-block">
                <div class="legend-value-w">
                  <div class="legend-pin legend-pin-squared"
                    style="background-color: #806ef9;"></div>
                  <div class="legend-value">
                    <span>Gucci</span>
                    <div class="legend-sub-value">17 Pairs</div>
                  </div>
                </div>
                <div class="legend-value-w">
                  <div class="legend-pin legend-pin-squared"
                    style="background-color: #d97b70;"></div>
                  <div class="legend-value">
                    <span>Armani</span>
                    <div class="legend-sub-value">12 Pairs</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!--END - Top Selling Chart-->
    </div>

    <div class="d-none d-xxxl-block col-xxxl-6">
        <!--START - Questions per Product-->
        <div class="element-wrapper">
          <div class="element-actions">
            <form class="form-inline justify-content-sm-end">
              <select class="form-control form-control-sm rounded"><option
                  value="Pending">Today</option>
                <option value="Active">Last Week</option>
                <option value="Cancelled">Last 30 Days</option></select>
            </form>
          </div>
          <h6 class="element-header">Inventory Stats</h6>
          <div class="element-box">

            <div class="os-progress-bar primary" *ngFor="let inventory of inventories">
              <div class="bar-labels">
                <div class="bar-label-left">
                  <span class="bigger">{{inventory.name}}</span>
                </div>
                <div class="bar-label-right">
                  <span class="info">{{inventory.items}} items / {{inventory.remaining}} remaining</span>
                </div>
              </div>
              <div class="bar-level-1" style="width: 100%">
                <div class="bar-level-2" style="width: 70%">
                  <div class="bar-level-3" style="width: 40%"></div>
                </div>
              </div>
            </div>

            <div class="mt-4 border-top pt-3">
              <div class="element-actions d-none d-sm-block">
                <form class="form-inline justify-content-sm-end">
                  <select
                    class="form-control form-control-sm form-control-faded"><option
                      selected="true">Last 30 days</option>
                    <option>This Week</option>
                    <option>This Month</option>
                    <option>Today</option></select>
                </form>
              </div>
              <h6 class="element-box-header">Inventory History {{valores}}</h6>
              <div class="el-chart-w">
                <canvas
                  data-chart-data="13,28,19,24,43,49,40,35,42,46,38,32,45"
                  height="50" id="liteLineChartV3" width="300"></canvas>
              </div>
            </div>
          </div>
        </div>
        <!--END - Questions per product                  -->
      </div>

    </div>
