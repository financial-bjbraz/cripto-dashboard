<div class="dt-container">
  <div class="error-banner" *ngIf="error$ | async as err">{{ err }} <button (click)="clearResult()">×</button></div>

  <div class="tx-result" *ngIf="txId$ | async as txId">
    <p>✓ Transferência enviada!</p>
    <p>txId: <code>{{ txId }}</code></p>
    <p>Status: {{ txStatus$ | async }}</p>
    <button (click)="clearResult()">Nova transferência</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onTransfer()" *ngIf="!(txId$ | async)">
    <div class="field">
      <label>Endereço destino</label>
      <input type="text" formControlName="toAddress" placeholder="0x…">
    </div>
    <div class="field">
      <label>Quantidade BRLN</label>
      <input type="number" formControlName="amountBrln" min="0.01" step="0.01">
    </div>
    <button type="submit" class="btn-transfer" [disabled]="loading$ | async">
      {{ (loading$ | async) ? 'Enviando…' : 'Transferir On-Chain' }}
    </button>
  </form>
</div>
