<div class="deploy-container">
  <!-- Error -->
  <div class="error-banner" *ngIf="error$ | async as err">
    {{ err }}
    <button (click)="reset()">Tentar novamente</button>
  </div>

  <!-- Polling / loading state -->
  <ng-container *ngIf="txId$ | async as txId">
    <div class="status-panel" *ngIf="(txStatus$ | async) !== 'Confirmed'">
      <div class="spinner-lg"></div>
      <p>Aguardando confirmação…</p>
      <code>txId: {{ txId }}</code>
    </div>

    <!-- Success -->
    <div class="success-panel" *ngIf="(txStatus$ | async) === 'Confirmed'">
      <p>✓ Contrato implantado com sucesso!</p>
      <p *ngIf="contractAddress$ | async as addr">
        Endereço: <code>{{ addr }}</code>
        <button class="btn-copy" (click)="copy(addr)">📋</button>
      </p>
      <button (click)="reset()">Novo deploy</button>
    </div>
  </ng-container>

  <!-- Form -->
  <ng-container *ngIf="!(txId$ | async) && !(error$ | async)">
    <form [formGroup]="form" (ngSubmit)="onDeploy()">
      <div class="field">
        <label>Token Name</label>
        <input type="text" formControlName="name">
      </div>
      <div class="field">
        <label>Token Symbol</label>
        <input type="text" formControlName="symbol">
      </div>
      <div class="field">
        <label>Decimals</label>
        <input type="number" formControlName="decimals" min="0" max="18">
      </div>
      <div class="field">
        <label>Initial Admin Address</label>
        <input type="text" formControlName="initialAdmin" placeholder="0x…">
      </div>
      <div class="field">
        <label>Rede</label>
        <select formControlName="network">
          <option *ngFor="let n of networks" [value]="n">{{ n }}</option>
        </select>
      </div>
      <button type="submit" class="btn-deploy" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Implantando…' : 'Deploy Contract' }}
      </button>
    </form>
  </ng-container>
</div>
